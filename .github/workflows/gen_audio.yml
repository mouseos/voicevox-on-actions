name: Gen audio

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Download Docker image
      run: docker pull voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    - name: Install depends
      run: |
        sudo apt install ffmpeg curl python3 python3-pip -y
        pip3 install requests pydub natsort
    - name: Run Docker container
      run: docker run --rm -p '127.0.0.1:50021:50021' voicevox/voicevox_engine:cpu-ubuntu20.04-latest & sleep 20;  python3 weather.py 016010
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: 気象情報（札幌）
        path: |
          **.wav
        if-no-files-found: ignore
