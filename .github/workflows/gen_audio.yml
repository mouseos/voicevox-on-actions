name: Container
on: push

jobs:
  voicevox-docker:
    runs-on: ubuntu-20.04
    container:
      image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
      ports:
        - 50021:50021
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install python
        run: |
          apt update
          apt install ffmpeg  python3 python3-pip -y
          pip3 install requests pydub natsort
          #sapporo
          python3 ./weather.py 016010
          ls -l
